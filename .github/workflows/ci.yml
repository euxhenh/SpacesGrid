name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (macOS)
    # macos-15 uses Apple Silicon (M-series); use macos-13 for Intel fallback.
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build (native)
        run: bash build.sh

      - name: Verify binary exists and is signed
        run: |
          BIN="build/SpacesGrid.app/Contents/MacOS/SpacesGrid"
          test -f "$BIN" || (echo "Binary not found" && exit 1)
          codesign --verify --verbose "$BIN"
          echo "Binary OK: $(file "$BIN")"

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: SpacesGrid-${{ github.sha }}
          path: build/SpacesGrid.app
          retention-days: 7
